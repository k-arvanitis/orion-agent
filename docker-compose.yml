services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      CORS_ORIGINS: http://localhost:3000

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # The browser needs a URL it can reach from the host, so this stays
      # localhost (not the api service name) — Next.js makes browser-side calls.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  ui:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    env_file: .env
